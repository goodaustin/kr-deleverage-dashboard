name: daily-update
on:
  schedule:
    - cron: "0 7 * * 1-5"   # 16:00 KST after close (fetch market)
    - cron: "0 5 * * 1-5"   # 14:00 KST (catch T+1 credit)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m src.update
      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/daily.csv index.html)" ]; then
            git add data/daily.csv index.html
            git commit -m "data: daily auto-update ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "no change"
          fi
